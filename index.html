<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shlak - License Plate Spotter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111;
    color: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #camera-container {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #canvas { display: none; }

  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 10;
  }

  #overlay.visible {
    display: flex;
  }

  #overlay .plate-number {
    font-size: 3rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    letter-spacing: 6px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
  }

  #overlay .plate-label {
    font-size: 1.5rem;
    color: #ff6b6b;
    font-weight: 600;
  }

  #start-screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 20;
    background: #111;
  }

  #start-screen h1 {
    font-size: 2rem;
  }

  #start-btn {
    padding: 16px 48px;
    font-size: 1.2rem;
    border: none;
    border-radius: 12px;
    background: #ffd700;
    color: #111;
    font-weight: bold;
    cursor: pointer;
  }

  #api-key-input {
    padding: 10px 16px;
    font-size: 1rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: #222;
    color: #fff;
    width: 80%;
    max-width: 400px;
    text-align: center;
  }

  #bottom-panel {
    height: 35dvh;
    min-height: 120px;
    background: #1a1a1a;
    border-top: 2px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #status-bar {
    padding: 8px 12px;
    background: #222;
    font-size: 0.85rem;
    color: #888;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #status-bar .active { color: #4caf50; }
  #status-bar .error { color: #f44336; }

  #plate-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .log-entry {
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-entry.normal {
    background: #252525;
    color: #aaa;
  }

  .log-entry.special {
    background: linear-gradient(135deg, #3a2800, #1a1200);
    border: 1px solid #ffd700;
    color: #ffd700;
  }

  .log-entry .label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #ff6b6b;
  }

  .log-entry .time {
    font-size: 0.75rem;
    color: #666;
  }
</style>
</head>
<body>

<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div class="plate-label" id="overlay-label"></div>
    <div class="plate-number" id="overlay-number"></div>
  </div>

  <div id="start-screen">
    <h1>Shlak Spotter</h1>
    <input type="text" id="api-key-input" placeholder="Gemini API Key" />
    <button id="start-btn">Start Camera</button>
  </div>
</div>

<div id="bottom-panel">
  <div id="status-bar">
    <span id="status-text">Ready</span>
    <span id="plate-count">0 plates</span>
  </div>
  <div id="plate-log"></div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────
const state = {
  apiKey: '',
  running: false,
  processing: false,
  paused: false,
  seenPlates: new Set(),
  specialPlates: new Set(),
  totalCount: 0,
  captureInterval: null,
};

// ─── DOM refs ───────────────────────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayLabel = document.getElementById('overlay-label');
const overlayNumber = document.getElementById('overlay-number');
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');
const apiKeyInput = document.getElementById('api-key-input');
const statusText = document.getElementById('status-text');
const plateCount = document.getElementById('plate-count');
const plateLog = document.getElementById('plate-log');

// ─── Audio: generate a short alert beep ─────────────────────────────────
function playAlert() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Two-tone alert
    [660, 880].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'square';
      gain.gain.value = 0.15;
      osc.start(audioCtx.currentTime + i * 0.15);
      osc.stop(audioCtx.currentTime + i * 0.15 + 0.12);
    });
  } catch (e) {
    // Audio not available
  }
}

// ─── Shlaklak detection ─────────────────────────────────────────────────
function detectShlaklak(digits) {
  // digits is a string of 7 or 8 digits
  const n = digits.length;
  let bestRun = 0;
  let bestDigit = '';

  // Linear scan: find longest run of identical consecutive digits
  let run = 1;
  for (let i = 1; i < n; i++) {
    if (digits[i] === digits[i - 1]) {
      run++;
    } else {
      if (run > bestRun) {
        bestRun = run;
        bestDigit = digits[i - 1];
      }
      run = 1;
    }
  }
  if (run > bestRun) {
    bestRun = run;
    bestDigit = digits[n - 1];
  }

  // Cyclic check: if first and last digits match, the run wraps around
  if (n > 0 && digits[0] === digits[n - 1] && bestRun < n) {
    let headRun = 0;
    for (let i = 0; i < n && digits[i] === digits[0]; i++) headRun++;
    let tailRun = 0;
    for (let i = n - 1; i >= 0 && digits[i] === digits[n - 1]; i--) tailRun++;
    const cyclicRun = headRun + tailRun;
    if (cyclicRun > bestRun) {
      bestRun = cyclicRun;
      bestDigit = digits[0];
      // Mark as cyclic
      return { run: bestRun, digit: bestDigit, cyclic: true };
    }
  }

  if (bestRun >= 3) {
    return { run: bestRun, digit: bestDigit, cyclic: false };
  }
  return null;
}

function shlaklakName(run, cyclic) {
  // 3 = shlaklak, 4 = shlaklaklak, etc.
  const laks = 'lak'.repeat(run - 1);
  const name = 'sh' + laks;
  return cyclic ? name + ' (cyclic)' : name;
}

function formatPlate(digits) {
  // Format as XX-XXX-XX or XXX-XX-XXX
  if (digits.length === 7) {
    return digits.slice(0, 2) + '-' + digits.slice(2, 5) + '-' + digits.slice(5, 7);
  } else if (digits.length === 8) {
    return digits.slice(0, 3) + '-' + digits.slice(3, 5) + '-' + digits.slice(5, 8);
  }
  return digits;
}

// ─── Gemini API call ────────────────────────────────────────────────────
async function extractPlates(imageBase64) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`;

  const body = {
    contents: [{
      parts: [
        {
          text: `Look at this image and find any Israeli vehicle license plates. Israeli plates contain only digits (7 or 8 digits). Return ONLY the digit sequences, one per line, no dashes or spaces. If no plates are visible, return "NONE". Do not include any other text.`
        },
        {
          inlineData: {
            mimeType: 'image/jpeg',
            data: imageBase64
          }
        }
      ]
    }],
    generationConfig: {
      temperature: 0.1,
      maxOutputTokens: 200,
    }
  };

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`Gemini API error: ${resp.status} ${errText.slice(0, 200)}`);
  }

  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // Extract digit sequences of 7-8 digits
  const matches = text.match(/\b\d{7,8}\b/g);
  return matches || [];
}

// ─── Capture & process a frame ──────────────────────────────────────────
async function captureAndProcess() {
  if (state.processing || state.paused || !state.running) return;
  state.processing = true;
  setStatus('Scanning...', 'active');

  try {
    // Capture frame
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    if (canvas.width === 0 || canvas.height === 0) {
      state.processing = false;
      return;
    }
    ctx.drawImage(video, 0, 0);

    // Convert to base64 JPEG
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    const base64 = dataUrl.split(',')[1];

    // Call Gemini
    const plates = await extractPlates(base64);

    for (const plate of plates) {
      state.totalCount++;
      const isNew = !state.seenPlates.has(plate);
      state.seenPlates.add(plate);

      const shk = detectShlaklak(plate);
      const isSpecial = shk !== null;
      const isNewSpecial = isSpecial && !state.specialPlates.has(plate);

      if (isNewSpecial) {
        state.specialPlates.add(plate);
      }

      // Log it
      addLogEntry(plate, shk, isNew);

      // Alert on new special plate
      if (isNewSpecial) {
        await showAlert(plate, shk);
      }
    }

    updatePlateCount();
    setStatus('Watching...', 'active');
  } catch (err) {
    console.error(err);
    setStatus(err.message.slice(0, 80), 'error');
  }

  state.processing = false;
}

// ─── UI helpers ─────────────────────────────────────────────────────────
function setStatus(text, cls) {
  statusText.textContent = text;
  statusText.className = cls || '';
}

function updatePlateCount() {
  plateCount.textContent = `${state.seenPlates.size} plates (${state.specialPlates.size} special)`;
}

function addLogEntry(digits, shk, isNew) {
  const el = document.createElement('div');
  const isSpecial = shk !== null;
  el.className = 'log-entry ' + (isSpecial ? 'special' : 'normal');

  const formatted = formatPlate(digits);
  const now = new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  let html = `<span>${formatted}</span>`;
  if (isSpecial) {
    html += `<span class="label">${shlaklakName(shk.run, shk.cyclic)}</span>`;
  }
  html += `<span class="time">${now}${isNew ? '' : ' (dup)'}</span>`;
  el.innerHTML = html;

  // Prepend (newest first)
  plateLog.insertBefore(el, plateLog.firstChild);

  // Keep log manageable
  while (plateLog.children.length > 100) {
    plateLog.removeChild(plateLog.lastChild);
  }
}

async function showAlert(digits, shk) {
  state.paused = true;
  video.pause();

  overlayNumber.textContent = formatPlate(digits);
  overlayLabel.textContent = shlaklakName(shk.run, shk.cyclic) + '!';
  overlay.classList.add('visible');

  playAlert();

  // Pause for 3 seconds
  await new Promise(r => setTimeout(r, 3000));

  overlay.classList.remove('visible');
  video.play();
  state.paused = false;
}

// ─── Start ──────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  const key = apiKeyInput.value.trim();
  if (!key) {
    alert('Please enter your Gemini API key');
    return;
  }
  state.apiKey = key;
  localStorage.setItem('shlak_api_key', key);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();

    startScreen.style.display = 'none';
    setStatus('Watching...', 'active');
    state.running = true;

    // Start capture loop
    state.captureInterval = setInterval(captureAndProcess, 1000);
  } catch (err) {
    alert('Camera error: ' + err.message);
  }
});

// Restore API key from localStorage if previously entered
apiKeyInput.value = localStorage.getItem('shlak_api_key') || '';
</script>
</body>
</html>
